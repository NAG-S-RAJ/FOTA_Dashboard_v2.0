<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>FOTA Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(
        circle at center,
        #071f4a 0%,
        #021330 40%,
        #010d23 100%
    );
}

.login-card{

    width:550px;

    background:
    linear-gradient(
        135deg,
        rgba(20,40,90,.95),
        rgba(5,20,60,.95)
    );

    border-radius:16px;

    padding:40px;

    box-shadow:
    0 15px 40px rgba(0,0,0,.45);

    border:
    1px solid rgba(80,120,255,.15);
}

.title{

    text-align:center;

    font-size:42px;

    font-weight:700;

    color:#4f8dff;

    white-space:nowrap;

    margin-bottom:25px;

    position:relative;

    left:-17px;
}

.divider{

    height:1px;

    background:
    linear-gradient(
        to right,
        transparent,
        #4f8dff,
        transparent
    );

    margin-bottom:30px;

    position:relative;
}

.divider::after{

    content:"";

    width:8px;
    height:8px;

    border-radius:50%;

    background:#4f8dff;

    position:absolute;

    left:50%;
    top:50%;

    transform:
    translate(-50%,-50%);

    box-shadow:
    0 0 10px #4f8dff;
}

.input-box{

    margin-bottom:18px;
}

.input-box input{

    width:100%;

    padding:14px;

    font-size:18px;

    color:white;

    background:
    rgba(255,255,255,.05);

    border:
    1px solid rgba(255,255,255,.12);

    border-radius:10px;

    outline:none;
}

.input-box input::placeholder{

    color:#9aa9cb;
}

.input-box input:focus{

    border-color:#4f8dff;

    box-shadow:
    0 0 10px rgba(79,141,255,.3);
}

.button-container{

    display:flex;

    justify-content:center;

    margin-top:25px;
}

.login-btn{

    width:220px;

    padding:12px;

    border:none;

    border-radius:10px;

    font-size:20px;

    font-weight:600;

    color:white;

    cursor:pointer;

    background:
    linear-gradient(
        90deg,
        #3678f0,
        #4f8dff
    );

    transition:.3s;
}

.login-btn:hover{

    transform:translateY(-2px);

    box-shadow:
    0 0 15px rgba(79,141,255,.5);
}

.error{

    color:#ff6b6b;

    text-align:center;

    margin-top:15px;

    font-size:14px;
}

</style>

</head>

<body>

<div class="login-card">

    <h1 class="title">
        FOTA Campaign Manager
    </h1>

    <div class="divider"></div>

    <div class="input-box">

        <input
            id="username"
            type="text"
            placeholder="Username">

    </div>

    <div class="input-box">

        <input
            id="password"
            type="password"
            placeholder="Password">

    </div>

    <div class="button-container">

        <button
            class="login-btn"
            onclick="login()">

            Login

        </button>

    </div>

    <div
        id="error"
        class="error">
    </div>

</div>

<script>

function login(){

    let user =
        document.getElementById(
            "username"
        ).value;

    let pass =
        document.getElementById(
            "password"
        ).value;

    if(
        user === "admin"
        &&
        pass === "bosch123"
    ){

        sessionStorage.setItem(
            "fota_logged_in",
            "true"
        );

        window.location =
            "index.html";
    }
    else{

        document.getElementById(
            "error"
        ).innerText =
            "Invalid username or password";
    }
}

</script>

</body>

</html>
